
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0"/>
<style>
  :root{
    --bg:#0a0c1a;--surface:#11142a;--card:#161a2e;--border:#1e2340;
    --text:#e8eaf6;--muted:#6b7db3;--radius:16px;
  }
  [data-theme="light"]{
    --bg:#eef0f8;--surface:#ffffff;--card:#ffffff;--border:#d8dcea;
    --text:#1a1d30;--muted:#5a6380;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  html{font-size:14px;-webkit-text-size-adjust:100%;}
  body{background:var(--bg);color:var(--text);font-family:'Segoe UI',system-ui,sans-serif;min-height:100vh;width:100%;overflow-x:hidden;transition:background .3s,color .3s;}

  /* HEADER */
  .header{
    padding:14px 16px 12px;background:var(--surface);border-bottom:1px solid var(--border);
    display:flex;align-items:center;justify-content:space-between;
    position:sticky;top:0;z-index:100;
    box-shadow:0 2px 24px rgba(0,0,0,0.25);
  }
  .hlogo{display:flex;align-items:center;gap:8px;}
  .hlogo-icon{width:32px;height:32px;border-radius:10px;background:linear-gradient(135deg,#6366f1,#a78bfa);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0;}
  .hlogo-text h1{font-size:15px;font-weight:800;letter-spacing:-.3px;}
  .hlogo-text h1 span{color:#818cf8;}
  .hlogo-text p{font-size:10px;color:var(--muted);margin-top:1px;}
  .theme-btn{
    background:var(--card);border:1px solid var(--border);color:var(--text);
    padding:7px 12px;border-radius:30px;cursor:pointer;font-size:11px;font-weight:700;
    display:flex;align-items:center;gap:5px;transition:all .2s;flex-shrink:0;
  }
  .theme-btn:active{transform:scale(.96);}

  /* MAIN */
  main{width:100%;padding:14px 12px 60px;max-width:480px;margin:0 auto;}

  /* SECTION */
  .sec{font-size:9px;font-weight:800;letter-spacing:1.8px;text-transform:uppercase;color:var(--muted);margin:20px 0 10px;display:flex;align-items:center;gap:8px;}
  .sec::after{content:'';flex:1;height:1px;background:var(--border);}

  /* PEOPLE GRID - 2 columns on mobile */
  .people-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}

  .person-card{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:18px 12px 14px;text-align:center;position:relative;overflow:hidden;
    transition:transform .2s,box-shadow .2s;
  }
  .person-card:active{transform:scale(.98);}
  .person-card::before{content:'';position:absolute;top:0;left:0;right:0;height:4px;}
  .p1::before{background:linear-gradient(90deg,#7c3aed,#a78bfa);}
  .p2::before{background:linear-gradient(90deg,#db2777,#f472b6);}
  .p3::before{background:linear-gradient(90deg,#0891b2,#67e8f9);}
  .p4::before{background:linear-gradient(90deg,#b45309,#facc15);}
  .p5::before{background:linear-gradient(90deg,#16a34a,#4ade80);}

  /* last card spans full width if odd total */
  .person-card.full-span{grid-column:1/-1;max-width:200px;margin:0 auto;width:100%;}

  .avatar-wrap{position:relative;display:inline-block;margin-bottom:10px;}
  .avatar-ring{
    width:64px;height:64px;border-radius:50%;padding:2.5px;
    display:flex;align-items:center;justify-content:center;
    animation:spin-ring 7s linear infinite;
  }
  .p1 .avatar-ring{background:conic-gradient(#a78bfa,#7c3aed,#a78bfa);}
  .p2 .avatar-ring{background:conic-gradient(#f472b6,#db2777,#f472b6);}
  .p3 .avatar-ring{background:conic-gradient(#67e8f9,#0891b2,#67e8f9);}
  .p4 .avatar-ring{background:conic-gradient(#facc15,#b45309,#facc15);}
  .p5 .avatar-ring{background:conic-gradient(#4ade80,#16a34a,#4ade80);}
  @keyframes spin-ring{from{transform:rotate(0)}to{transform:rotate(360deg)}}
  .avatar-inner{width:57px;height:57px;border-radius:50%;background:var(--card);display:flex;align-items:center;justify-content:center;overflow:hidden;}
  .avatar{width:55px;height:55px;border-radius:50%;object-fit:cover;}
  .pulse-dot{position:absolute;bottom:2px;right:2px;width:13px;height:13px;border-radius:50%;border:2.5px solid var(--card);animation:pulse 2s infinite;}
  .p1 .pulse-dot{background:#a78bfa;}
  .p2 .pulse-dot{background:#f472b6;}
  .p3 .pulse-dot{background:#67e8f9;}
  .p4 .pulse-dot{background:#facc15;}
  .p5 .pulse-dot{background:#4ade80;}
  @keyframes pulse{0%,100%{transform:scale(1);opacity:1;}50%{transform:scale(1.4);opacity:.5;}}

  .person-name{font-size:13px;font-weight:800;margin-bottom:4px;}
  .person-total{font-size:32px;font-weight:900;line-height:1;}
  .p1 .person-total{color:#a78bfa;}
  .p2 .person-total{color:#f472b6;}
  .p3 .person-total{color:#67e8f9;}
  .p4 .person-total{color:#facc15;}
  .p5 .person-total{color:#4ade80;}
  .person-sub{font-size:10px;color:var(--muted);margin-top:2px;}
  .pills{display:flex;gap:4px;justify-content:center;margin-top:8px;flex-wrap:wrap;}
  .pill{font-size:10px;padding:3px 8px;border-radius:20px;font-weight:700;}
  .pill-v{background:rgba(59,130,246,.18);color:#60a5fa;}
  .pill-a{background:rgba(239,68,68,.18);color:#f87171;}

  /* MATRIX - horizontal scroll */
  .matrix-card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);overflow:hidden;}
  .matrix-scroll{overflow-x:auto;-webkit-overflow-scrolling:touch;}
  .scroll-hint{font-size:9px;color:var(--muted);text-align:right;padding:4px 10px 6px;display:flex;align-items:center;justify-content:flex-end;gap:4px;}
  .matrix-table{border-collapse:collapse;font-size:11px;width:100%;min-width:340px;}
  .matrix-table th{background:var(--surface);padding:10px 8px;text-align:center;font-size:11px;font-weight:800;border-bottom:1px solid var(--border);}
  .matrix-table td{padding:10px 6px;text-align:center;border-bottom:1px solid var(--border);}
  .matrix-table tr:last-child td{border-bottom:none;}
  .matrix-table td:first-child{font-weight:800;font-size:11px;background:var(--surface);border-right:1px solid var(--border);white-space:nowrap;padding:10px 12px;}
  .cell{display:flex;gap:3px;justify-content:center;align-items:center;}
  .cbadge{font-size:9px;font-weight:700;padding:2px 6px;border-radius:8px;}
  .cv{background:rgba(59,130,246,.18);color:#60a5fa;}
  .ca{background:rgba(239,68,68,.18);color:#f87171;}
  .cz{color:var(--border);font-size:14px;}

  .legend{display:flex;gap:16px;margin-top:10px;justify-content:center;}
  .leg{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted);}
  .leg-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}

  /* CALL LOG */
  .log-item{
    background:var(--card);border:1px solid var(--border);border-radius:var(--radius);
    padding:14px 14px;margin-bottom:10px;display:flex;align-items:center;gap:12px;
    position:relative;overflow:hidden;animation:fadeSlide .4s ease both;
    transition:transform .2s,box-shadow .2s;
  }
  .log-item:active{transform:scale(.99);}
  @keyframes fadeSlide{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
  .log-item::before{content:'';position:absolute;left:0;top:0;bottom:0;width:4px;}
  .log-audio::before{background:linear-gradient(to bottom,#ef4444,#dc2626);}
  .log-video::before{background:linear-gradient(to bottom,#3b82f6,#1d4ed8);}

  .log-avatars{display:flex;align-items:center;flex-shrink:0;}
  .log-av{width:40px;height:40px;border-radius:50%;object-fit:cover;border:2.5px solid var(--bg);}
  .log-av:nth-child(2){margin-left:-12px;}

  .log-info{flex:1;min-width:0;}
  .log-names{font-size:13px;font-weight:700;}
  .log-date{font-size:10px;color:var(--muted);margin-top:3px;}
  .log-topic{font-size:11px;color:#818cf8;margin-top:2px;font-style:italic;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}

  .log-right{text-align:right;flex-shrink:0;}
  .log-type-badge{font-size:10px;font-weight:700;padding:3px 9px;border-radius:20px;display:inline-block;margin-bottom:4px;}
  .badge-audio{background:rgba(239,68,68,.18);color:#f87171;}
  .badge-video{background:rgba(59,130,246,.18);color:#60a5fa;}
  .log-dur{font-size:11px;color:var(--muted);font-weight:700;}

  /* STATS BAR */
  .stats-bar{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:4px;}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px 8px;text-align:center;}
  .stat-num{font-size:22px;font-weight:900;}
  .stat-lbl{font-size:9px;color:var(--muted);font-weight:700;letter-spacing:.8px;text-transform:uppercase;margin-top:2px;}
  .stat-total .stat-num{color:#818cf8;}
  .stat-video .stat-num{color:#60a5fa;}
  .stat-audio .stat-num{color:#f87171;}
</style>

<div class="header">
  <div class="hlogo">
    <div class="hlogo-icon">📡</div>
    <div class="hlogo-text">
      <h1>Call <span>Tracker</span></h1>
      <p>Team Communication Log</p>
    </div>
  </div>
  <button class="theme-btn" id="themeBtn" onclick="toggleTheme()">
    <span id="themeIcon">🌙</span><span id="themeLbl">Dark</span>
  </button>
</div>

<main>
  <!-- STATS BAR -->
  <div class="sec">Overview</div>
  <div class="stats-bar">
    <div class="stat-box stat-total"><div class="stat-num" id="totalCalls">0</div><div class="stat-lbl">Total</div></div>
    <div class="stat-box stat-video"><div class="stat-num" id="totalVideo">0</div><div class="stat-lbl">💻 Video</div></div>
    <div class="stat-box stat-audio"><div class="stat-num" id="totalAudio">0</div><div class="stat-lbl">📞 Audio</div></div>
  </div>

  <div class="sec">Team Members</div>
  <div class="people-grid" id="peopleGrid"></div>

  <div class="sec">Call Matrix</div>
  <div class="matrix-card">
    <div class="scroll-hint">← swipe →</div>
    <div class="matrix-scroll">
      <table class="matrix-table" id="matrixTable"></table>
    </div>
  </div>
  <div class="legend">
    <div class="leg"><div class="leg-dot" style="background:#60a5fa"></div>💻 Video</div>
    <div class="leg"><div class="leg-dot" style="background:#f87171"></div>📞 Audio</div>
  </div>

  <div class="sec">Call Log</div>
  <div id="callLog"></div>
</main>

<script>
const PEOPLE={
  P1:{name:'Arun',  avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=Arun&backgroundColor=ede9fe'},
  P2:{name:'Cholai',avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=Cholai&backgroundColor=fce7f3'},
  P3:{name:'Naveen',avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=Naveen&backgroundColor=ecfeff'},
  P4:{name:'Pon',   avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=Pon&backgroundColor=fefce8'},
  P5:{name:'Varun', avatar:'https://api.dicebear.com/7.x/avataaars/svg?seed=Varun&backgroundColor=dcfce7'}
};
const PCOLORS={P1:'#a78bfa',P2:'#f472b6',P3:'#67e8f9',P4:'#facc15',P5:'#4ade80'};
const PC_ARR=['#a78bfa','#f472b6','#67e8f9','#facc15','#4ade80'];

const CALLS=[
 // {date:'01-15-26',caller1:'P1',caller2:'P2',type:'Audio',duration:0.5,topic:'Interviewer / Candidate'},
 // {date:'03-20-26',caller1:'P4',caller2:'P3',type:'Video',duration:1,  topic:'Doctor / Patient'},
 // {date:'04-05-26',caller1:'P1',caller2:'P3',type:'Video',duration:0.5,topic:'Team Sync'},
 // {date:'04-10-26',caller1:'P2',caller2:'P5',type:'Audio',duration:1.5,topic:'Project Review'},
 // {date:'05-01-26',caller1:'P4',caller2:'P1',type:'Video',duration:1,  topic:'Design Review'},
 // {date:'05-18-26',caller1:'P5',caller2:'P3',type:'Audio',duration:0.5,topic:'Sprint Planning'},
];

const PKEYS=Object.keys(PEOPLE);

function getTheme(){try{const s=localStorage.getItem('ct-theme');if(s)return s;}catch(e){}return window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light';}
function applyTheme(t){document.body.setAttribute('data-theme',t==='light'?'light':'');document.getElementById('themeIcon').textContent=t==='light'?'🌙':'☀️';document.getElementById('themeLbl').textContent=t==='light'?'Dark':'Light';}
function toggleTheme(){const c=document.body.getAttribute('data-theme')==='light'?'light':'dark';const n=c==='light'?'dark':'light';try{localStorage.setItem('ct-theme',n);}catch(e){}applyTheme(n);}
applyTheme(getTheme());

function stats(){
  const s={};PKEYS.forEach(p=>s[p]={total:0,audio:0,video:0,duration:0});
  CALLS.forEach(c=>{[c.caller1,c.caller2].forEach(p=>{if(!s[p])return;s[p].total++;s[p].duration+=c.duration;c.type==='Audio'?s[p].audio++:s[p].video++;});});
  return s;
}
function matrix(){
  const m={};PKEYS.forEach(p=>{m[p]={};PKEYS.forEach(q=>m[p][q]={a:0,v:0});});
  CALLS.forEach(c=>{if(!m[c.caller1]||!m[c.caller1][c.caller2])return;c.type==='Audio'?(m[c.caller1][c.caller2].a++,m[c.caller2][c.caller1].a++):(m[c.caller1][c.caller2].v++,m[c.caller2][c.caller1].v++);});
  return m;
}

const st=stats();

// Overview stats
document.getElementById('totalCalls').textContent=CALLS.length;
document.getElementById('totalVideo').textContent=CALLS.filter(c=>c.type==='Video').length;
document.getElementById('totalAudio').textContent=CALLS.filter(c=>c.type==='Audio').length;

// People grid — last card spans full if odd
const peopleHTML=PKEYS.map((p,i)=>{
  const isLast=i===PKEYS.length-1;
  const isOdd=PKEYS.length%2!==0;
  const spanClass=(isLast&&isOdd)?'full-span':'';
  return `<div class="person-card p${i+1} ${spanClass}">
    <div class="avatar-wrap">
      <div class="avatar-ring"><div class="avatar-inner">
        <img class="avatar" src="${PEOPLE[p].avatar}" alt="${PEOPLE[p].name}"
          onerror="this.src='https://ui-avatars.com/api/?name=${PEOPLE[p].name}&background=random&size=60'"/>
      </div></div>
      <div class="pulse-dot"></div>
    </div>
    <div class="person-name">${PEOPLE[p].name}</div>
    <div class="person-total">${st[p].total}</div>
    <div class="person-sub">${st[p].duration}h total</div>
    <div class="pills">
      ${st[p].video?`<span class="pill pill-v">💻 ${st[p].video}</span>`:''}
      ${st[p].audio?`<span class="pill pill-a">📞 ${st[p].audio}</span>`:''}
    </div>
  </div>`;
}).join('');
document.getElementById('peopleGrid').innerHTML=peopleHTML;

// Matrix
const mx=matrix();
let mhtml='<thead><tr><th></th>';
PKEYS.forEach((p,i)=>mhtml+=`<th style="color:${PC_ARR[i]}">${PEOPLE[p].name}</th>`);
mhtml+='</tr></thead><tbody>';
PKEYS.forEach((row,ri)=>{
  mhtml+=`<tr><td style="color:${PC_ARR[ri]}">${PEOPLE[row].name}</td>`;
  PKEYS.forEach(col=>{
    if(row===col){mhtml+=`<td><span class="cz">—</span></td>`;return;}
    const v=mx[row][col].v,a=mx[row][col].a;
    mhtml+=`<td><div class="cell">`;
    mhtml+=v?`<span class="cbadge cv">💻${v}</span>`:`<span class="cz">·</span>`;
    mhtml+=a?`<span class="cbadge ca">📞${a}</span>`:`<span class="cz">·</span>`;
    mhtml+=`</div></td>`;
  });
  mhtml+='</tr>';
});
mhtml+='</tbody>';
document.getElementById('matrixTable').innerHTML=mhtml;

// Log
const sorted=[...CALLS].sort((a,b)=>b.date.localeCompare(a.date));
document.getElementById('callLog').innerHTML=sorted.map((c,idx)=>`
  <div class="log-item log-${c.type.toLowerCase()}" style="animation-delay:${idx*0.07}s">
    <div class="log-avatars">
      <img class="log-av" src="${PEOPLE[c.caller1].avatar}" alt="${c.caller1}"
        onerror="this.src='https://ui-avatars.com/api/?name=${PEOPLE[c.caller1].name}&background=random&size=40'"/>
      <img class="log-av" src="${PEOPLE[c.caller2].avatar}" alt="${c.caller2}"
        onerror="this.src='https://ui-avatars.com/api/?name=${PEOPLE[c.caller2].name}&background=random&size=40'"/>
    </div>
    <div class="log-info">
      <div class="log-names">
        <span style="color:${PCOLORS[c.caller1]}">${PEOPLE[c.caller1].name}</span>
        <span style="color:var(--muted);font-weight:400"> ↔ </span>
        <span style="color:${PCOLORS[c.caller2]}">${PEOPLE[c.caller2].name}</span>
      </div>
      <div class="log-date">📅 ${c.date}</div>
      <div class="log-topic">${c.topic}</div>
    </div>
    <div class="log-right">
      <div class="log-type-badge ${c.type==='Audio'?'badge-audio':'badge-video'}">
        ${c.type==='Audio'?'📞':'💻'} ${c.type}
      </div>
      <div class="log-dur">${c.duration}h</div>
    </div>
  </div>
`).join('');
</script>
